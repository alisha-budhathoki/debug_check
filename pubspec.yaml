name: debug_deck
description: >-
  Drop-in Flutter debug overlay: a Dio network inspector with per-request
  search, log & error console, FPS/jank monitor, layout grid and app-info
  snapshot.
repository: https://github.com/alisha-budhathoki/debug_check
homepage: https://github.com/alisha-budhathoki/debug_check
issue_tracker: https://github.com/alisha-budhathoki/debug_check/issues
version: 0.5.0
environment:
  sdk: ^3.7.0
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.7.0

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

screenshots:
  - description: >-
      The inspector log list — Dio calls with method/status badges, latency
      colour-banding, duplicate-call detection and the captured error console.
    path: screenshots/01-log-list.png
  - description: >-
      One API call in detail with auto-derived insight chips (SERVER 500,
      SLOW), tabbed Overview/Request/Headers/Response, and cURL/JSON/HAR export.
    path: screenshots/02-api-detail.png
  - description: >-
      Search inside a response body — every match highlighted, listed in a
      results bar, with prev/next jump-to-match navigation.
    path: screenshots/03-search-response.png
  - description: >-
      Live performance monitor — FPS gauge, dropped-frame ratio, worst frame,
      UI/raster split and a frame-time sparkline, labelled with the screen.
    path: screenshots/04-performance.png
  - description: >-
      The shareable app-info snapshot — build/env, API stats, error summary and
      device/platform facts, copyable for bug reports.
    path: screenshots/05-app-info.png

platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows:
